// ── API ────────────────────────────────────────────────────────
async function api(action, payload={}) {
  if (!API_URL || API_URL === 'PASTE_YOUR_APPS_SCRIPT_WEB_APP_URL_HERE')
    throw new Error('Apps Script URL not configured. Edit index.html and set API_URL.');
  const res = await fetch(API_URL, {
    method:'POST', redirect:'follow',
    headers:{'Content-Type':'text/plain;charset=utf-8'},
    body: JSON.stringify({action, ...payload}),
  });
  if (!res.ok) throw new Error(`Network error: HTTP ${res.status}`);
  const json = await res.json();
  if (json.error) throw new Error(json.error);
  return json;
}

function exportCSV(rows, fname) {
  if (!rows.length){alert('No data to export.');return;}
  const keys=[...new Set(rows.flatMap(r=>Object.keys(r)))];
  const csv=[keys.join(','),...rows.map(r=>
    keys.map(k=>`"${String(r[k]||'').replace(/"/g,'""')}"`).join(','))].join('\n');
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));
  a.download=fname; a.click();
}

// ── SVG CHARTS (no external library) ─────────────────────────
function BarSVG({data, vk='v', lk='name', colors=[], height=180}) {
  if(!data||!data.length) return <Empty msg="No data yet"/>;
  const max=Math.max(...data.map(d=>d[vk]),1);
  const W=100/data.length;
  return (
    <svg viewBox={`0 0 100 ${height}`} style={{width:'100%',height}} preserveAspectRatio="none">
      {data.map((d,i)=>{
        const barH=(d[vk]/max)*(height-28);
        const x=i*W+W*.1, w=W*.8, y=height-28-barH;
        const col=colors[i%Math.max(colors.length,1)]||C.navy;
        return (
          <g key={i}>
            <rect x={x} y={y} width={w} height={barH} fill={col} rx="1.5"/>
            <text x={x+w/2} y={y-3} textAnchor="middle" fontSize="5" fill={col} fontWeight="700">
              {d[vk]}
            </text>
            <text x={x+w/2} y={height-4} textAnchor="middle" fontSize="4.2" fill="#64748B">
              {String(d[lk]).slice(0,9)}
            </text>
          </g>
        );
      })}
    </svg>
  );
}

function PieSVG({data, vk='value', lk='name', colors=[]}) {
  if(!data||!data.length) return <Empty msg="No data yet"/>;
  const total=data.reduce((s,d)=>s+d[vk],0);
  if(!total) return <Empty msg="No data yet"/>;
  const cx=50, cy=50, r=36;
  let angle=-Math.PI/2;
  const slices=data.map((d,i)=>{
    const frac=d[vk]/total;
    const a1=angle, a2=angle+frac*2*Math.PI;
    angle=a2;
    const x1=cx+r*Math.cos(a1), y1=cy+r*Math.sin(a1);
    const x2=cx+r*Math.cos(a2), y2=cy+r*Math.sin(a2);
    const large=frac>.5?1:0;
    const mid=a1+(a2-a1)/2;
    const lx=cx+(r+14)*Math.cos(mid), ly=cy+(r+14)*Math.sin(mid);
    return {x1,y1,x2,y2,large,col:colors[i%Math.max(colors.length,1)]||C.navy,
      pct:Math.round(frac*100), name:d[lk], lx, ly, frac};
  });
  return (
    <svg viewBox="0 0 100 100" style={{width:'100%',maxHeight:200}}>
      {slices.map((s,i)=>(
        <path key={i}
          d={s.frac>=0.999
            ? `M ${cx} ${cy-r} A ${r} ${r} 0 1 1 ${cx-.001} ${cy-r} Z`
            : `M ${cx} ${cy} L ${s.x1} ${s.y1} A ${r} ${r} 0 ${s.large} 1 ${s.x2} ${s.y2} Z`}
          fill={s.col} stroke="#fff" strokeWidth=".8"/>
      ))}
      {slices.filter(s=>s.pct>=8).map((s,i)=>(
        <text key={i} x={s.lx} y={s.ly} textAnchor="middle" fontSize="4.5"
          fill={s.col} fontWeight="700">{s.pct}%</text>
      ))}
    </svg>
  );
}

function App(){
  const [loading,setLoading]=useState(true);
  const [user,setUser]=useState(null);
  const [recs,setRecs]=useState([]);
  const [users,setUsers]=useState([]);
  const [page,setPage]=useState('dashboard');
  const [toast,setToast]=useState(null);
  const tRef=useRef(null);

  const notify=useCallback((msg,type='ok')=>{
    clearTimeout(tRef.current);
    setToast({msg,type});
    tRef.current=setTimeout(()=>setToast(null),3600);
  },[]);

  useEffect(()=>{
    (async()=>{
      try{
        const saved=localStorage.getItem('iilm_sess');
        if(saved){
          const u=JSON.parse(saved);
          setUser(u);
          const [rr,ur]=await Promise.all([
            api('getRecords',{userId:u.id}),
            ['admin','universityHead','schoolHead'].includes(u.role)
              ?api('getUsers',{userId:u.id}):Promise.resolve({users:[]}),
          ]);
          if(rr.success)setRecs(rr.records);
          if(ur.success)setUsers(ur.users);
        }
      }catch(e){
        localStorage.removeItem('iilm_sess');
        setUser(null);
      }
      setLoading(false);
    })();
  },[]);

  const doLogin=async u=>{
    setUser(u);
    localStorage.setItem('iilm_sess',JSON.stringify(u));
    const[rr,ur]=await Promise.all([
      api('getRecords',{userId:u.id}),
      ['admin','universityHead','schoolHead'].includes(u.role)
        ?api('getUsers',{userId:u.id}):Promise.resolve({users:[]}),
    ]);
    if(rr.success)setRecs(rr.records);
    if(ur.success)setUsers(ur.users);
  };
  const logout=()=>{
    setUser(null);setRecs([]);setUsers([]);
    localStorage.removeItem('iilm_sess');
    setPage('dashboard');
    notify('Logged out successfully.');
  };
  const refreshRecs=async()=>{
    if(!user)return;
    try{const r=await api('getRecords',{userId:user.id});if(r.success)setRecs(r.records);}
    catch(e){notify(e.message,'err');}
  };
  const refreshUsers=async()=>{
    if(!user)return;
    try{const r=await api('getUsers',{userId:user.id});if(r.success)setUsers(r.users);}
    catch(e){}
  };

  if(loading) return(
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',
      height:'100vh',background:`linear-gradient(135deg,${C.dk},${C.navy})`}}>
      <div style={{color:'#fff',textAlign:'center'}}>
        <div style={{fontSize:60,marginBottom:16}}>🎓</div>
        <div style={{fontSize:20,fontWeight:900,letterSpacing:'.06em'}}>IILM RESEARCH DASHBOARD</div>
        <div style={{marginTop:8,opacity:.4,fontSize:13}} className="pulse">Loading…</div>
      </div>
    </div>
  );

  const ctx={user,users,recs,setRecs,setUsers,notify,refreshRecs,refreshUsers};
  return(
    <div>
      <APIBanner/>
      {toast&&(
        <div style={{position:'fixed',top:16,right:16,zIndex:9999,
          background:toast.type==='err'?C.red:'#166534',color:'#fff',
          padding:'12px 20px',borderRadius:10,fontSize:13.5,fontWeight:600,
          boxShadow:'0 6px 28px rgba(0,0,0,.25)',animation:'fadeUp .22s ease',maxWidth:360}}>
          {toast.type==='err'?'❌ ':'✅ '}{toast.msg}
        </div>
      )}
      {!user
        ?<AuthPage doLogin={doLogin} notify={notify}/>
        :<Shell {...ctx} page={page} setPage={setPage} logout={logout}/>
      }
    </div>
  );
}

function Shell(props){
  const{user,recs,page,setPage,logout}=props;
  const[col,setCol]=useState(false);
  const canApprove=['schoolHead','universityHead','admin'].includes(user.role);
  const canAll    =['schoolHead','universityHead','admin'].includes(user.role);
  const isAdmin   =user.role==='admin';
  const pending=recs.filter(r=>{
    if(r.approvalStatus!=='pending')return false;
    if(user.role==='admin'||user.role==='universityHead')return true;
    return user.role==='schoolHead'&&r.school===user.school;
  }).length;

  const NAV=[
    {id:'dashboard',l:'Dashboard',   icon:'📊'},
    {id:'addRecord', l:'Add Research',icon:'➕'},
    {id:'myRecords', l:'My Records', icon:'📋'},
    canAll     &&{id:'allRecords',l:'All Records',  icon:'🗃️'},
    {id:'analytics', l:'Analytics',  icon:'📈'},
    canApprove &&{id:'approvals', l:'Approvals',    icon:'✅',badge:pending},
    isAdmin    &&{id:'admin',     l:'Admin Panel',  icon:'⚙️'},
  ].filter(Boolean);

  return(
    <div style={{display:'flex',height:'100vh',overflow:'hidden'}}>
      {/* Sidebar */}
      <div style={{width:col?62:230,background:C.dk,color:'#fff',flexShrink:0,
        display:'flex',flexDirection:'column',transition:'width .2s',
        overflow:'hidden',borderRight:'1px solid rgba(255,255,255,.05)'}}>
        <div style={{padding:'16px 12px',borderBottom:'1px solid rgba(255,255,255,.07)',flexShrink:0}}>
          <div style={{display:'flex',alignItems:'center',gap:9}}>
            <span style={{fontSize:24,flexShrink:0}}>🎓</span>
            {!col&&<div>
              <div style={{fontWeight:800,fontSize:13,lineHeight:1.2}}>IILM Research</div>
              <div style={{fontSize:9.5,opacity:.4,marginTop:1}}>AI CoE · SCSE Gurugram</div>
            </div>}
          </div>
        </div>
        <nav style={{flex:1,padding:'10px 7px',overflowY:'auto'}}>
          {NAV.map(n=>(
            <button key={n.id} onClick={()=>setPage(n.id)}
              style={{width:'100%',display:'flex',alignItems:'center',gap:9,
                padding:'9px 10px',borderRadius:9,border:'none',cursor:'pointer',
                marginBottom:3,textAlign:'left',
                background:  page===n.id?'rgba(201,166,42,.2)':'transparent',
                color:       page===n.id?C.gold:'rgba(255,255,255,.68)',
                fontWeight:  page===n.id?700:400,fontSize:13.5,
                borderLeft:  page===n.id?`3px solid ${C.gold}`:'3px solid transparent',
                transition:  'all .13s'}}>
              <span style={{fontSize:16,flexShrink:0}}>{n.icon}</span>
              {!col&&<span style={{flex:1}}>{n.l}</span>}
              {!col&&n.badge>0&&(
                <span style={{background:C.red,borderRadius:20,minWidth:20,height:20,
                  fontSize:11,display:'flex',alignItems:'center',
                  justifyContent:'center',padding:'0 5px',fontWeight:800}}>
                  {n.badge}
                </span>
              )}
            </button>
          ))}
        </nav>
        <div style={{padding:'10px 7px',borderTop:'1px solid rgba(255,255,255,.07)',flexShrink:0}}>
          {!col&&(
            <div style={{padding:'9px 10px',background:'rgba(255,255,255,.06)',
              borderRadius:8,marginBottom:8,fontSize:12}}>
              <div style={{fontWeight:700,overflow:'hidden',textOverflow:'ellipsis',
                whiteSpace:'nowrap'}}>{user.name}</div>
              <div style={{opacity:.45,marginTop:2,fontSize:10.5}}>{RLBL[user.role]}</div>
            </div>
          )}
          <button onClick={()=>setCol(c=>!c)}
            style={{...SB('rgba(255,255,255,.08)','rgba(255,255,255,.55)',
              {width:'100%',marginBottom:6,fontSize:12,padding:'7px',justifyContent:'center'})}}>
            {col?'▶':'◀ Collapse'}
          </button>
          <button onClick={logout}
            style={{...SB(C.red,'#fff',{width:'100%',fontSize:12,padding:'7px',justifyContent:'center'})}}>
            {col?'🚪':'🚪 Logout'}
          </button>
        </div>
      </div>

      {/* Main */}
      <div style={{flex:1,display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <div style={{background:'#fff',padding:'12px 22px',
          borderBottom:`1px solid ${C.border}`,flexShrink:0,
          display:'flex',alignItems:'center',justifyContent:'space-between',
          boxShadow:'0 1px 4px rgba(11,31,75,.05)'}}>
          <div>
            <div style={{fontWeight:800,fontSize:16,color:C.navy}}>
              {NAV.find(n=>n.id===page)?.icon}&nbsp;
              {NAV.find(n=>n.id===page)?.l||'Dashboard'}
            </div>
            <div style={{fontSize:11,color:C.muted,marginTop:1}}>
              {new Date().toLocaleDateString('en-IN',
                {weekday:'long',year:'numeric',month:'long',day:'numeric'})}

          <div style={{display:'flex',gap:7,flexWrap:'wrap',alignItems:'center'}}>
            <span style={{background:C.navy+'12',color:C.navy,padding:'4px 12px',
              borderRadius:20,fontSize:12,fontWeight:700}}>{RLBL[user.role]}</span>
            <span style={{background:C.gold+'22',color:'#7a5800',padding:'4px 12px',
              borderRadius:20,fontSize:12,fontWeight:600}}>

          {page==='addRecord' &&<PageAdd      {...props}/>}
          {page==='myRecords' &&<PageRecs     {...props} mode='my'/>}
          {page==='allRecords'&&canAll&&<PageRecs {...props} mode='all'/>}
          {page==='analytics' &&<PageAnaly   {...props}/>}
          {page==='approvals' &&canApprove&&<PageApprove {...props}/>}
          {page==='admin'     &&isAdmin   &&<PageAdmin   {...props}/>}
        </div>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
function PageDash({user,recs}){
  const vis=user.role==='user'?recs.filter(r=>r.userId===user.id)
    :user.role==='schoolHead'?recs.filter(r=>r.school===user.school):recs;

  const STATS=[
    {l:'Total Research',    v:vis.length,                                              i:'📚',c:C.navy},
    {l:'Journal Papers',    v:vis.filter(r=>r.type==='journal').length,               i:'📄',c:'#6D28D9'},
    {l:'Conference Papers', v:vis.filter(r=>r.type==='conference').length,            i:'🎤',c:'#0369A1'},
    {l:'Patents',           v:vis.filter(r=>r.type==='patent').length,                i:'💡',c:C.red},
    {l:'Funded Projects',   v:vis.filter(r=>r.type==='fundedProject').length,         i:'💰',c:'#C2410C'},
    {l:'Approved',          v:vis.filter(r=>r.approvalStatus==='approved').length,    i:'✅',c:C.green},
  ];
  const catData=CATS.map(c=>({
    name:c.label.replace(' Paper','').replace('Authored ','').replace('Edited ',''),
    v:vis.filter(r=>r.type===c.id).length,color:c.color
  })).filter(d=>d.v>0);
  const yearData=(()=>{
    const m={};
    vis.forEach(r=>{const d=r.data?.publishDate||r.data?.filingDate||r.createdAt;
      if(d){const y=d.slice(0,4);m[y]=(m[y]||0)+1;}});
    return Object.entries(m).sort().map(([y,v])=>({name:y,v}));
  })();

  return(
    <div className="fadeUp">
      <div style={{marginBottom:20}}>
        <div style={{fontSize:21,fontWeight:900,color:C.navy}}>
          Welcome back, {user.name.split(' ')[0]}! 👋
        </div>
        <div style={{color:C.muted,fontSize:13.5,marginTop:3}}>Here's your research overview</div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(150px,1fr))',
        gap:12,marginBottom:20}}>
        {STATS.map(s=>(
          <div key={s.l} style={{...SC(),borderTop:`4px solid ${s.c}`}}>
            <div style={{fontSize:26,marginBottom:6}}>{s.i}</div>
            <div style={{fontSize:32,fontWeight:900,color:s.c,lineHeight:1}}>{s.v}</div>
            <div style={{fontSize:12,color:C.muted,marginTop:5,fontWeight:600}}>{s.l}</div>
          </div>
        ))}
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16,marginBottom:18}}>
        <div style={SC()}>
          <div style={{fontWeight:800,color:C.navy,marginBottom:12,fontSize:14}}>
            📊 Research by Category
          </div>
          <BarSVG data={catData} vk='v' lk='name' colors={catData.map(d=>d.color)} height={180}/>
        </div>
        <div style={SC()}>
          <div style={{fontWeight:800,color:C.navy,marginBottom:12,fontSize:14}}>
            📈 Year-wise Trend
          </div>
          <BarSVG data={yearData} vk='v' lk='name' colors={[C.navy]} height={180}/>
        </div>
      </div>

      <div style={SC()}>
        <div style={{fontWeight:800,color:C.navy,marginBottom:14,fontSize:14}}>
          🕐 Recent Submissions
        </div>
        {vis.length===0
          ?<Empty msg='No records yet' sub='Add your first research entry!'/>
          :<RecTable rows={[...vis].reverse().slice(0,7)} mini/>
        }
      </div>
    </div>
  );
}

//  ADD RECORD
// ══════════════════════════════════════════════════════════════
function PageAdd({user,setRecs,notify}){
  const[type,setType]=useState('journal');
  const[form,setForm]=useState({});
  const[busy,setBusy]=useState(false);
  const upd=(k,v)=>setForm(f=>({...f,[k]:v}));
  const cat=catOf(type);

  const submit=async()=>{
    const miss=(FIELDS[type]||[]).filter(f=>f.req&&!form[f.n]);
    if(miss.length)return notify(`Required: ${miss.map(f=>f.l).join(', ')}`,'err');
    setBusy(true);
    try{
      const r=await api('addRecord',{userId:user.id,type,data:form});
      setRecs(prev=>[...prev,r.record]);
      setForm({});
      notify('Record submitted! Awaiting approval.');
    }catch(e){notify(e.message,'err');}
    setBusy(false);
  };

  return(
    <div className="fadeUp">
      <div style={{marginBottom:18}}>
        <div style={{fontSize:18,fontWeight:900,color:C.navy}}>Add Research Record</div>
        <div style={{color:C.muted,fontSize:13.5,marginTop:2}}>
          Select category → fill details → submit for approval
        </div>
      </div>
      <div style={{display:'flex',flexWrap:'wrap',gap:8,marginBottom:20}}>
        {CATS.map(c=>(
          <button key={c.id} onClick={()=>{setType(c.id);setForm({});}}
            style={{padding:'7px 14px',borderRadius:20,cursor:'pointer',fontWeight:700,
              fontSize:13,transition:'all .15s',
              border:`2px solid ${type===c.id?c.color:C.border}`,
              background:type===c.id?c.color:'#fff',
              color:type===c.id?'#fff':'#374151'}}>
            {c.emoji} {c.label}
          </button>
        ))}
      </div>
      <div style={{...SC(),borderTop:`4px solid ${cat.color}`}}>
        <div style={{fontWeight:800,fontSize:15,color:cat.color,marginBottom:18}}>
          {cat.emoji} {cat.label} — Entry Form
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(255px,1fr))',gap:14}}>
          {(FIELDS[type]||[]).map(f=>(
            <div key={f.n} style={{gridColumn:f.n==='title'||f.full?'1/-1':'auto'}}>
              <label style={SL}>{f.l}{f.req&&<span style={{color:C.red}}> *</span>}</label>
              {f.type==='sel'?(
                <select style={SI()} value={form[f.n]||''} onChange={e=>upd(f.n,e.target.value)}>
                  <option value=''>Select…</option>
                  {f.opts.map(o=><option key={o}>{o}</option>)}
                </select>
              ):(
                <input style={SI()} type={f.type||'text'} placeholder={f.ph||''}
                  value={form[f.n]||''} onChange={e=>upd(f.n,e.target.value)}/>
              )}
            </div>
          ))}
        </div>
        <div style={{marginTop:20,display:'flex',gap:10,paddingTop:16,
          borderTop:`1px solid ${C.border}`}}>
          <button style={SB(cat.color,'#fff',{padding:'11px 26px',fontSize:14})}
            onClick={submit} disabled={busy}>
            {busy?<><Spin/>&nbsp;Saving…</>:'💾 Submit Record'}
          </button>
          <button style={SB('#F1F5F9','#475569',{padding:'11px 18px',fontSize:14})}
            onClick={()=>setForm({})}>🔄 Clear</button>
        </div>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
//  RECORDS
// ══════════════════════════════════════════════════════════════
function PageRecs({user,recs,setRecs,notify,mode}){
  const[search,setSrch]=useState('');
  const[fType,setFT]=useState('');
  const[fSchool,setFS]=useState(user.role==='schoolHead'?user.school:'');
  const[fYear,setFY]=useState('');
  const[fStatus,setFSt]=useState('');
  const[editRec,setEdit]=useState(null);
  const[busyId,setBusy]=useState(null);

  let vis=mode==='my'?recs.filter(r=>r.userId===user.id)
    :user.role==='schoolHead'?recs.filter(r=>r.school===user.school):recs;
  if(fType)  vis=vis.filter(r=>r.type===fType);
  if(fSchool)vis=vis.filter(r=>r.school===fSchool);
  if(fStatus)vis=vis.filter(r=>r.approvalStatus===fStatus);
  if(fYear)  vis=vis.filter(r=>{
    const d=r.data?.publishDate||r.data?.filingDate||r.createdAt;
    return d?.startsWith(fYear);
  });
  if(search){
    const q=search.toLowerCase();
    vis=vis.filter(r=>
      r.data?.title?.toLowerCase().includes(q)||r.authorName?.toLowerCase().includes(q)||
      r.data?.journalName?.toLowerCase().includes(q)||r.data?.conferenceName?.toLowerCase().includes(q));
  }
  const unique=dedup(vis);

  const del=async id=>{
    if(!confirm('Delete this record?'))return;
    setBusy(id);
    try{
      await api('deleteRecord',{userId:user.id,recordId:id});
      setRecs(prev=>prev.filter(r=>r.id!==id));
      notify('Record deleted.');
    }catch(e){notify(e.message,'err');}
    setBusy(null);
  };

  return(
    <div className="fadeUp">
      {editRec&&<EditModal rec={editRec} user={user} onClose={()=>setEdit(null)}
        onSave={async(id,data)=>{
          try{
            await api('updateRecord',{userId:user.id,recordId:id,data});
            setRecs(prev=>prev.map(r=>r.id===id
              ?{...r,data,approvalStatus:'pending',approvedBy:'',approvedAt:''}:r));
            setEdit(null);notify('Record updated — resubmitted for approval.');
          }catch(e){notify(e.message,'err');}
        }}/>
      }

      <div style={{display:'flex',justifyContent:'space-between',
        alignItems:'flex-start',marginBottom:16,flexWrap:'wrap',gap:12}}>
        <div>
          <div style={{fontSize:18,fontWeight:900,color:C.navy}}>
            {mode==='my'?'My Records':'All Records'}
          </div>
          <div style={{color:C.muted,fontSize:13,marginTop:2}}>
            {vis.length} records &nbsp;·&nbsp;
            <span style={{color:C.green,fontWeight:700}}>{unique.length} unique contributions</span>
          </div>
        </div>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          <button style={SB(C.green,'#fff')}
            onClick={()=>exportCSV(mkRows(vis),`IILM_All_${Date.now()}.csv`)}>
            📥 Export All
          </button>
          {mode!=='my'&&(
            <button style={SB(C.gold,'#5a3800')}
              onClick={()=>exportCSV(mkRows(unique),`IILM_Unique_${Date.now()}.csv`)}>
              📥 Unique Only
            </button>
          )}
        </div>
      </div>

      <div style={{...SC(),marginBottom:14}}>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(165px,1fr))',gap:11}}>
          <input style={SI()} placeholder='🔍 Search…' value={search} onChange={e=>setSrch(e.target.value)}/>
          <select style={SI()} value={fType} onChange={e=>setFT(e.target.value)}>
            <option value=''>All Types</option>
            {CATS.map(c=><option key={c.id} value={c.id}>{c.label}</option>)}
          </select>
          {mode!=='my'&&user.role!=='schoolHead'&&(
            <select style={SI()} value={fSchool} onChange={e=>setFS(e.target.value)}>
              <option value=''>All Schools</option>
              {SCHOOLS.map(s=><option key={s}>{s}</option>)}
            </select>
          )}
          <select style={SI()} value={fStatus} onChange={e=>setFSt(e.target.value)}>
            <option value=''>All Statuses</option>
            <option value='pending'>Pending</option>
            <option value='approved'>Approved</option>
            <option value='rejected'>Rejected</option>
          </select>
          <input style={SI()} type='number' placeholder='Year e.g. 2023'
            value={fYear} onChange={e=>setFY(e.target.value)} min='2000' max='2030'/>
        </div>
      </div>

      <div style={SC()}>
        <RecTable rows={vis} user={user} onDelete={del}
          onEdit={setEdit} busyId={busyId} showAuthor={mode!=='my'}/>
      </div>
    </div>
  );
}

function EditModal({rec,user,onClose,onSave}){
  const[form,setForm]=useState({...rec.data});
  const[busy,setBusy]=useState(false);
  const upd=(k,v)=>setForm(f=>({...f,[k]:v}));
  const cat=catOf(rec.type);
  const save=async()=>{
    const miss=(FIELDS[rec.type]||[]).filter(f=>f.req&&!form[f.n]);
    if(miss.length)return alert(`Required: ${miss.map(f=>f.l).join(', ')}`);
    setBusy(true);await onSave(rec.id,form);setBusy(false);
  };
  return(
    <div style={{position:'fixed',inset:0,zIndex:1000,
      background:'rgba(7,19,55,.72)',display:'flex',
      alignItems:'center',justifyContent:'center',padding:20}}>
      <div style={{background:'#fff',borderRadius:16,width:'100%',maxWidth:660,
        maxHeight:'88vh',overflow:'auto',boxShadow:'0 24px 80px rgba(0,0,0,.4)'}}>
        <div style={{padding:'18px 22px',borderBottom:`1px solid ${C.border}`,
          display:'flex',justifyContent:'space-between',alignItems:'center',
          position:'sticky',top:0,background:'#fff',zIndex:1}}>
          <div style={{fontWeight:800,fontSize:15,color:cat.color}}>
            {cat.emoji} Edit — {cat.label}
          </div>
          <button onClick={onClose}
            style={SB('#F1F5F9','#475569',{padding:'6px 12px',fontSize:12})}>
            ✕ Cancel
          </button>
        </div>
        <div style={{padding:22}}>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(245px,1fr))',gap:13}}>
            {(FIELDS[rec.type]||[]).map(f=>(
              <div key={f.n} style={{gridColumn:f.n==='title'||f.full?'1/-1':'auto'}}>
                <label style={SL}>{f.l}{f.req&&<span style={{color:C.red}}> *</span>}</label>
                {f.type==='sel'?(
                  <select style={SI()} value={form[f.n]||''} onChange={e=>upd(f.n,e.target.value)}>
                    <option value=''>Select…</option>
                    {f.opts.map(o=><option key={o}>{o}</option>)}
                  </select>
                ):(
                  <input style={SI()} type={f.type||'text'} placeholder={f.ph||''}
                    value={form[f.n]||''} onChange={e=>upd(f.n,e.target.value)}/>
                )}
              </div>
            ))}
          </div>
          <div style={{marginTop:18,display:'flex',gap:10,paddingTop:16,
            borderTop:`1px solid ${C.border}`}}>
            <button style={SB(cat.color,'#fff',{padding:'10px 24px'})}
              onClick={save} disabled={busy}>
              {busy?<><Spin/>&nbsp;Saving…</>:'💾 Save Changes'}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
//  ANALYTICS
// ══════════════════════════════════════════════════════════════
function PageAnaly({user,recs}){
  const[fs,setFs]=useState(user.role==='schoolHead'?user.school:'');
  const[fy,setFy]=useState('');

  let d=user.role==='user'?recs.filter(r=>r.userId===user.id)
    :user.role==='schoolHead'?recs.filter(r=>r.school===user.school):recs;
  if(fs)d=d.filter(r=>r.school===fs);
  if(fy)d=d.filter(r=>{
    const dt=r.data?.publishDate||r.data?.filingDate||r.createdAt;
    return dt?.startsWith(fy);
  });

  const PAL=['#0B1F4B','#B91C1C','#D97706','#059669','#7C3AED','#0891B2','#9D174D','#065F46'];

  const catData=CATS.map(c=>({
    name:c.label.replace(' Paper','').replace('Authored ','').replace('Edited ',''),
    value:d.filter(r=>r.type===c.id).length,color:c.color
  })).filter(x=>x.value>0);

  const yearData=(()=>{
    const m={};
    d.forEach(r=>{const dt=r.data?.publishDate||r.data?.filingDate||r.createdAt;
      if(dt){const y=dt.slice(0,4);m[y]=(m[y]||0)+1;}});
    return Object.entries(m).sort().map(([y,v])=>({name:y,v}));
  })();
  const idxData=(()=>{
    const m={};
    d.filter(r=>r.data?.indexing).forEach(r=>{m[r.data.indexing]=(m[r.data.indexing]||0)+1;});
    return Object.entries(m).sort((a,b)=>b[1]-a[1]).map(([name,value])=>({name,value}));
  })();
  const schData=(()=>{
    const m={};
    d.forEach(r=>{if(r.school)m[r.school]=(m[r.school]||0)+1;});
    return Object.entries(m).sort((a,b)=>b[1]-a[1]).slice(0,8)
      .map(([name,count])=>({name:name.replace('School of ',''),v:count}));
  })();
  const statusData=[
    {name:'Approved',value:d.filter(r=>r.approvalStatus==='approved').length,color:C.green},
    {name:'Pending', value:d.filter(r=>r.approvalStatus==='pending').length, color:'#D97706'},
    {name:'Rejected',value:d.filter(r=>r.approvalStatus==='rejected').length,color:C.red},
  ].filter(x=>x.value>0);

  return(
    <div className="fadeUp">
      <div style={{marginBottom:18}}>
        <div style={{fontSize:18,fontWeight:900,color:C.navy}}>Research Analytics</div>
        <div style={{color:C.muted,fontSize:13.5,marginTop:2}}>
          Insights based on {d.length} record{d.length!==1?'s':''}
        </div>
      </div>

      {user.role!=='user'&&(
        <div style={{...SC(),marginBottom:16}}>
          <div style={{display:'flex',gap:12,flexWrap:'wrap',alignItems:'center'}}>
            {user.role!=='schoolHead'&&(
              <select style={{...SI(),maxWidth:310}} value={fs} onChange={e=>setFs(e.target.value)}>
                <option value=''>All Schools</option>
                {SCHOOLS.map(s=><option key={s}>{s}</option>)}
              </select>
            )}
            <input style={{...SI(),maxWidth:160}} type='number' placeholder='Filter by Year'
              value={fy} onChange={e=>setFy(e.target.value)} min='2000' max='2030'/>
          </div>
        </div>
      )}

      {/* Mini count cards */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(125px,1fr))',
        gap:9,marginBottom:16}}>
        {CATS.map(c=>(
          <div key={c.id} style={{background:'#fff',borderRadius:10,padding:'11px 13px',
            borderTop:`3px solid ${c.color}`,boxShadow:'0 1px 5px rgba(11,31,75,.07)'}}>
            <div style={{fontSize:18}}>{c.emoji}</div>
            <div style={{fontSize:22,fontWeight:900,color:c.color}}>
              {d.filter(r=>r.type===c.id).length}
            </div>
            <div style={{fontSize:10.5,color:C.muted,marginTop:2,lineHeight:1.3}}>{c.label}</div>
          </div>
        ))}
      </div>

      {d.length===0
        ?<div style={{...SC(),padding:60,textAlign:'center'}}><Empty msg='No data for selected filters'/></div>
        :(
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
            {catData.length>0&&(
              <div style={SC()}>
                <div style={{fontWeight:800,color:C.navy,marginBottom:8,fontSize:14}}>Research Distribution</div>
                <PieSVG data={catData} vk='value' lk='name' colors={catData.map(c=>c.color)}/>
                <Legend data={catData} vk='value' lk='name' colors={catData.map(c=>c.color)}/>
              </div>
            )}
            {yearData.length>0&&(
              <div style={SC()}>
                <div style={{fontWeight:800,color:C.navy,marginBottom:8,fontSize:14}}>Year-wise Publications</div>
                <BarSVG data={yearData} vk='v' lk='name' colors={[C.navy]} height={190}/>
              </div>
            )}
            {idxData.length>0&&(
              <div style={SC()}>
                <div style={{fontWeight:800,color:C.navy,marginBottom:8,fontSize:14}}>Indexing Breakdown</div>
                <BarSVG data={idxData} vk='value' lk='name' colors={PAL} height={190}/>
              </div>
            )}
            {schData.length>1&&(
              <div style={SC()}>
                <div style={{fontWeight:800,color:C.navy,marginBottom:8,fontSize:14}}>School-wise Contributions</div>
                <BarSVG data={schData} vk='v' lk='name' colors={[C.red,...PAL]} height={190}/>
              </div>
            )}
            {statusData.length>0&&(
              <div style={SC()}>
                <div style={{fontWeight:800,color:C.navy,marginBottom:8,fontSize:14}}>Approval Status</div>
                <PieSVG data={statusData} vk='value' lk='name' colors={statusData.map(d=>d.color)}/>
                <Legend data={statusData} vk='value' lk='name' colors={statusData.map(d=>d.color)}/>
              </div>
            )}
          </div>
        )
      }
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
//  APPROVALS
// ══════════════════════════════════════════════════════════════
function PageApprove({user,recs,setRecs,notify}){
  const[busyId,setBusy]=useState(null);
  const[filter,setFilter]=useState(user.role==='schoolHead'?user.school:'');

  let pending=recs.filter(r=>{
    if(r.approvalStatus!=='pending')return false;
    if(user.role==='admin'||user.role==='universityHead')return true;
    return user.role==='schoolHead'&&r.school===user.school;
  });
  if(filter&&user.role!=='schoolHead')pending=pending.filter(r=>r.school===filter);

  const decide=async(id,status)=>{
    setBusy(id);
    try{
      await api('approveRecord',{userId:user.id,recordId:id,status});
      setRecs(prev=>prev.map(r=>r.id===id
        ?{...r,approvalStatus:status,approvedBy:user.name,approvedAt:new Date().toISOString()}:r));
      notify(status==='approved'?'Record approved ✅':'Record rejected ❌');
    }catch(e){notify(e.message,'err');}
    setBusy(null);
  };

  return(
    <div className="fadeUp">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',
        marginBottom:18,flexWrap:'wrap',gap:12}}>
        <div>
          <div style={{fontSize:18,fontWeight:900,color:C.navy}}>Approval Queue</div>
          <div style={{color:C.muted,fontSize:13.5,marginTop:2}}>
            {pending.length} record{pending.length!==1?'s':''} awaiting review
          </div>
        </div>
        {(user.role==='admin'||user.role==='universityHead')&&(
          <select style={{...SI(),maxWidth:290}} value={filter} onChange={e=>setFilter(e.target.value)}>
            <option value=''>All Schools</option>
            {SCHOOLS.map(s=><option key={s}>{s}</option>)}
          </select>
        )}
      </div>

      {pending.length===0?(
        <div style={{...SC(),textAlign:'center',padding:60}}>
          <div style={{fontSize:52,marginBottom:12}}>✅</div>
          <div style={{color:C.muted,fontWeight:600}}>All clear! Nothing pending.</div>
        </div>
      ):(
        <div style={{display:'flex',flexDirection:'column',gap:12,marginBottom:20}}>
          {pending.map(r=>(
            <div key={r.id} style={{...SC(),borderLeft:`5px solid ${catOf(r.type).color}`}}>
              <div style={{display:'flex',justifyContent:'space-between',
                alignItems:'flex-start',flexWrap:'wrap',gap:12}}>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:7,flexWrap:'wrap'}}>
                    <span style={{background:catOf(r.type).color+'15',color:catOf(r.type).color,
                      padding:'3px 10px',borderRadius:12,fontSize:12,fontWeight:700}}>
                      {catOf(r.type).emoji} {catOf(r.type).label}
                    </span>
                    <span style={{color:C.muted,fontSize:12}}>{r.createdAt?.slice(0,10)}</span>
                  </div>
                  <div style={{fontWeight:700,fontSize:15,marginBottom:5}}>{r.data?.title||'—'}</div>
                  <div style={{fontSize:13,color:C.muted,display:'flex',gap:16,flexWrap:'wrap'}}>
                    <span>👤 {r.authorName}</span>
                    <span>🏫 {r.school?.replace('School of ','')}</span>
                    <span>📋 {r.designation}</span>
                  </div>
                  <div style={{marginTop:6,display:'flex',flexWrap:'wrap',gap:14,fontSize:12}}>
                    {r.data?.indexing   &&<span>📊 {r.data.indexing}</span>}
                    {r.data?.publishDate&&<span>📅 {r.data.publishDate}</span>}
                    {r.data?.doi        &&<span>🔗 {r.data.doi}</span>}
                  </div>
                  {r.data?.driveLink&&(
                    <a href={r.data.driveLink} target='_blank' rel='noreferrer'
                      style={{fontSize:12,color:C.navy,fontWeight:600,
                        display:'inline-flex',alignItems:'center',gap:4,marginTop:6}}>
                      📎 View Proof Document ↗
                    </a>
                  )}
                </div>
                <div style={{display:'flex',gap:8,flexShrink:0}}>
                  <button style={SB('#D1FAE5','#065F46',{padding:'9px 18px',fontWeight:800})}
                    onClick={()=>decide(r.id,'approved')} disabled={busyId===r.id}>
                    {busyId===r.id?<Spin/>:'✅ Approve'}
                  </button>
                  <button style={SB('#FEE2E2','#991B1B',{padding:'9px 18px',fontWeight:800})}
                    onClick={()=>decide(r.id,'rejected')} disabled={busyId===r.id}>
                    ❌ Reject
                  </button>
                </div>
              </div>
            </div>
          ))}
        </div>
      )}

      {recs.filter(r=>r.approvedBy).length>0&&(
        <div style={SC()}>
          <div style={{fontWeight:800,color:C.navy,marginBottom:12,fontSize:14}}>Recently Reviewed</div>
          {recs.filter(r=>r.approvedBy).reverse().slice(0,8).map(r=>(
            <div key={r.id} style={{display:'flex',gap:12,alignItems:'center',
              padding:'8px 12px',borderRadius:8,background:C.bg,fontSize:13,marginBottom:6}}>
              <StatusBadge s={r.approvalStatus}/>
              <span style={{fontWeight:600,flex:1,overflow:'hidden',
                textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.data?.title||'—'}</span>
              <span style={{color:C.muted,fontSize:11,whiteSpace:'nowrap'}}>by {r.approvedBy}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
//  ADMIN
// ══════════════════════════════════════════════════════════════
function PageAdmin({user,users,recs,setUsers,notify}){
  const[q,setQ]=useState('');
  const[busyId,setBusy]=useState(null);
  const filt=users.filter(u=>
    u.name?.toLowerCase().includes(q.toLowerCase())||
    u.email?.toLowerCase().includes(q.toLowerCase()));

  const updRole=async(id,role)=>{
    setBusy(id);
    try{
      await api('updateRole',{userId:user.id,targetId:id,role});
      setUsers(prev=>prev.map(u=>u.id===id?{...u,role}:u));
      notify(`Role updated to ${RLBL[role]}`);
    }catch(e){notify(e.message,'err');}
    setBusy(null);
  };
  const delUser=async id=>{
    if(!confirm('Delete user? This cannot be undone.'))return;
    setBusy(id);
    try{
      await api('deleteUser',{userId:user.id,targetId:id});
      setUsers(prev=>prev.filter(u=>u.id!==id));
      notify('User removed.');
    }catch(e){notify(e.message,'err');}
    setBusy(null);
  };

  const STATS=[
    {l:'Total Users',  v:users.length,                                        i:'👥',c:C.navy},
    {l:'Records',      v:recs.length,                                          i:'📋',c:'#7C3AED'},
    {l:'Approved',     v:recs.filter(r=>r.approvalStatus==='approved').length, i:'✅',c:C.green},
    {l:'Pending',      v:recs.filter(r=>r.approvalStatus==='pending').length,  i:'⏳',c:C.gold},
    {l:'School Heads', v:users.filter(u=>u.role==='schoolHead').length,        i:'🏫',c:C.red},
  ];

  return(
    <div className="fadeUp">
      <div style={{fontSize:18,fontWeight:900,color:C.navy,marginBottom:18}}>Admin Panel</div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(148px,1fr))',
        gap:11,marginBottom:18}}>
        {STATS.map(s=>(
          <div key={s.l} style={{...SC(),borderLeft:`4px solid ${s.c}`}}>
            <div style={{fontSize:22}}>{s.i}</div>
            <div style={{fontSize:26,fontWeight:900,color:s.c}}>{s.v}</div>
            <div style={{fontSize:12,color:C.muted,fontWeight:600,marginTop:3}}>{s.l}</div>
          </div>
        ))}
      </div>

      <div style={SC()}>
        <div style={{display:'flex',justifyContent:'space-between',
          alignItems:'center',marginBottom:14,flexWrap:'wrap',gap:12}}>
          <div style={{fontWeight:800,color:C.navy,fontSize:14}}>
            User Management ({filt.length})
          </div>
          <input style={{...SI(),width:230}} placeholder='🔍 Search users…'
            value={q} onChange={e=>setQ(e.target.value)}/>
        </div>
        <div style={{overflowX:'auto'}}>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
            <thead>
              <tr style={{borderBottom:`2px solid ${C.border}`}}>
                {['Name','Email','School','Emp. Code','Designation','Role','Records','Actions'].map(h=>(
                  <th key={h} style={{padding:'9px 12px',textAlign:'left',fontWeight:700,
                    color:C.navy,fontSize:11.5,textTransform:'uppercase',
                    letterSpacing:'.04em',whiteSpace:'nowrap'}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {filt.map(u=>(
                <tr key={u.id} className='rh' style={{borderBottom:`1px solid ${C.border}`}}>
                  <td style={{padding:'9px 12px',fontWeight:600}}>{u.name}</td>
                  <td style={{padding:'9px 12px',color:C.muted,fontSize:12}}>{u.email}</td>
                  <td style={{padding:'9px 12px',fontSize:12,maxWidth:120,overflow:'hidden',
                    textOverflow:'ellipsis',whiteSpace:'nowrap'}}>
                    {u.school?.replace('School of ','')||'—'}
                  </td>
                  <td style={{padding:'9px 12px',fontSize:12}}>{u.employeeCode||'—'}</td>
                  <td style={{padding:'9px 12px',fontSize:12}}>{u.designation||'—'}</td>
                  <td style={{padding:'9px 12px'}}>
                    <select value={u.role||'user'}
                      disabled={u.id===user.id||busyId===u.id}
                      onChange={e=>updRole(u.id,e.target.value)}
                      style={{...SI(),padding:'5px 8px',fontSize:12,width:'auto'}}>
                      <option value='user'>Faculty</option>
                      <option value='schoolHead'>School Head</option>
                      <option value='universityHead'>University Head</option>
                      <option value='admin'>Admin</option>
                    </select>
                  </td>
                  <td style={{padding:'9px 12px',textAlign:'center'}}>
                    <span style={{background:C.navy+'15',color:C.navy,padding:'3px 10px',
                      borderRadius:12,fontSize:12,fontWeight:700}}>
                      {recs.filter(r=>r.userId===u.id).length}
                    </span>
                  </td>
                  <td style={{padding:'9px 12px'}}>
                    {u.id!==user.id&&(
                      <button style={SB('#FEF2F2',C.red,{padding:'5px 10px',fontSize:11})}
                        onClick={()=>delUser(u.id)} disabled={busyId===u.id}>
                        {busyId===u.id?<Spin/>:'🗑️'}
                      </button>
                    )}
                  </td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
//  SHARED TABLE
// ══════════════════════════════════════════════════════════════
function RecTable({rows,user,onDelete,onEdit,busyId,showAuthor,mini}){
  const[exp,setExp]=useState(null);
  if(!rows||rows.length===0)return <Empty msg='No records found'/>;
  return(
    <div style={{overflowX:'auto'}}>
      <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
        <thead>
          <tr style={{borderBottom:`2px solid ${C.border}`}}>
            {['Type','Title',showAuthor&&'Author','Date','Status',!mini&&'Actions']
              .filter(Boolean).map(h=>(
              <th key={h} style={{padding:'9px 12px',textAlign:'left',fontWeight:700,
                color:C.navy,fontSize:11.5,textTransform:'uppercase',
                letterSpacing:'.04em',whiteSpace:'nowrap'}}>{h}</th>
            ))}
          </tr>
        </thead>
        <tbody>
          {rows.map(r=>(
            <Fragment key={r.id}>
              <tr className='rh'
                style={{borderBottom:`1px solid ${C.border}`,cursor:mini?'default':'pointer'}}
                onClick={()=>!mini&&setExp(exp===r.id?null:r.id)}>
                <td style={{padding:'9px 12px'}}>
                  <span style={{background:catOf(r.type).color+'18',
                    color:catOf(r.type).color,padding:'3px 9px',borderRadius:12,
                    fontSize:11.5,fontWeight:700,whiteSpace:'nowrap'}}>
                    {catOf(r.type).emoji} {catOf(r.type).label}
                  </span>
                </td>
                <td style={{padding:'9px 12px',maxWidth:210,overflow:'hidden',
                  textOverflow:'ellipsis',whiteSpace:'nowrap',fontWeight:500}}>
                  {r.data?.title||'—'}
                </td>
                {showAuthor&&(
                  <td style={{padding:'9px 12px',color:C.muted,whiteSpace:'nowrap'}}>
                    {r.authorName}
                  </td>
                )}
                <td style={{padding:'9px 12px',color:C.muted,fontSize:12,whiteSpace:'nowrap'}}>
                  {r.data?.publishDate||r.data?.filingDate||r.createdAt?.slice(0,10)||'—'}
                </td>
                <td style={{padding:'9px 12px'}}><StatusBadge s={r.approvalStatus}/></td>
                {!mini&&(
                  <td style={{padding:'9px 12px'}}>
                    <div style={{display:'flex',gap:5}}>
                      <button style={SB('#EFF6FF',C.navy,{padding:'4px 9px',fontSize:11})}
                        onClick={e=>{e.stopPropagation();setExp(exp===r.id?null:r.id);}}>
                        {exp===r.id?'▲':'▼'}
                      </button>
                      {r.data?.driveLink&&(
                        <a href={r.data.driveLink} target='_blank' rel='noreferrer'
                          onClick={e=>e.stopPropagation()}
                          style={{...SB('#F0FDF4',C.green,{padding:'4px 9px',fontSize:11})}}>
                          🔗
                        </a>
                      )}
                      {(user?.id===r.userId||user?.role==='admin')&&onEdit&&
                        r.approvalStatus!=='approved'&&(
                        <button style={SB('#FFF7ED','#C2410C',{padding:'4px 9px',fontSize:11})}
                          onClick={e=>{e.stopPropagation();onEdit(r);}}>✏️</button>
                      )}
                      {(user?.id===r.userId||user?.role==='admin')&&onDelete&&(
                        <button style={SB('#FEF2F2',C.red,{padding:'4px 9px',fontSize:11})}
                          onClick={e=>{e.stopPropagation();onDelete(r.id);}}
                          disabled={busyId===r.id}>
                          {busyId===r.id?<Spin/>:'🗑️'}
                        </button>
                      )}
                    </div>
                  </td>
                )}
              </tr>
              {exp===r.id&&(
                <tr>
                  <td colSpan={10} style={{background:'#F8FAFF',padding:'14px 18px',
                    borderBottom:`2px solid ${C.border}`}}>
                    <div style={{display:'grid',
                      gridTemplateColumns:'repeat(auto-fit,minmax(185px,1fr))',gap:8,fontSize:12}}>
                      <div style={{background:'#fff',padding:'8px 12px',borderRadius:7,
                        border:`1px solid ${C.border}`,gridColumn:'1/-1'}}>
                        <div style={{...SL,marginBottom:3,fontSize:10}}>Author Info</div>
                        <div style={{fontWeight:500}}>
                          {r.authorName} · {r.school} · {r.designation}
                        </div>
                      </div>
                      {Object.entries(r.data||{}).filter(([,v])=>v).map(([k,v])=>(
                        <div key={k} style={{background:'#fff',padding:'8px 12px',
                          borderRadius:7,border:`1px solid ${C.border}`}}>
                          <div style={{...SL,marginBottom:3,fontSize:10}}>
                            {k.replace(/([A-Z])/g,' $1').trim()}
                          </div>
                          <div style={{fontWeight:500,color:C.text,wordBreak:'break-word'}}>
                            {k==='driveLink'
                              ?<a href={v} target='_blank' rel='noreferrer'
                                  style={{color:C.navy,fontWeight:600}}>View Proof ↗</a>
                              :v}
                          </div>
                        </div>
                      ))}
                    </div>
                  </td>
                </tr>
              )}
            </Fragment>
          ))}
        </tbody>
      </table>
    </div>
  );
}

// ── MOUNT ──────────────────────────────────────────────────────
const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(<App/>);
</script>
</body>
</html>
